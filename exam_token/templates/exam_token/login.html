<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Đăng nhập</title>
</head>
<body class="min-h-screen bg-blue-900">
  <div class="flex min-h-screen items-center justify-center bg-[radial-gradient(circle_at_top_left,_rgba(255,255,255,.20),transparent_30%),radial-gradient(circle_at_bottom_right,_rgba(56,189,248,.25),transparent_35%)] px-4">
    <form method="post" class="w-full max-w-md rounded-2xl bg-white p-8 shadow-2xl">
      {% csrf_token %}
      <div class="mb-7 text-center">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center shadow">
          <img src="/media/logo_login.jpg" alt="Logo Đại học Cảnh sát" class="h-full w-full object-contain">         
        </div>
        <h1 class="text-2xl font-black uppercase text-slate-950">Hệ thống chấm điểm trực tuyến</h1>
        <p class="mt-2 text-sm text-slate-500">Đăng nhập để quản lý phiên thi</p>
      </div>
      {% if messages %}{% for m in messages %}<div class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ m }}</div>{% endfor %}{% endif %}
      <label class="text-sm font-bold text-slate-700">Tài khoản</label>
      <input name="username" autofocus class="mb-4 mt-1 w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
      <label class="text-sm font-bold text-slate-700">Mật khẩu</label>
      <input name="password" type="password" class="mb-6 mt-1 w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
      <button class="w-full rounded-xl bg-blue-800 px-4 py-3 font-black text-white hover:bg-blue-900">Đăng nhập</button>
    </form>
  </div>
</body>
</html>
