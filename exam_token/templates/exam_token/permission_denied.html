{% extends 'exam_token/base.html' %}
{% block title %}Không có quyền{% endblock %}

{% block content %}
<div class="rounded-2xl bg-white p-8 shadow">
  <h1 class="text-2xl font-black text-red-700">Bạn không có quyền truy cập chức năng này</h1>
  <p class="mt-2 text-slate-600">
    Tài khoản hiện tại chưa được phân quyền phù hợp. Vui lòng đăng xuất và đăng nhập bằng tài khoản khác nếu cần.
  </p>
  <div class="mt-5 flex gap-3">
    <a href="{% url 'logout' %}" class="rounded-xl bg-slate-900 px-4 py-2 font-bold text-white">
      Đăng xuất
    </a>
    <a href="{% url 'home' %}" class="rounded-xl bg-slate-100 px-4 py-2 font-bold text-slate-700">
      Về trang chủ
    </a>
  </div>
</div>
{% endblock %}
